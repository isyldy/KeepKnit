<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>KeepKnit</title>


<style>
@import url('https://fonts.googleapis.com/css2?family=Agbalumo&family=Noto+Sans+KR:wght@300&family=Playwrite+GB+J+Guides:ital@0;1&family=Zalando+Sans+Expanded:ital,wght@0,200..900;1,200..900&display=swap');
</style>

  <link rel="stylesheet" href="./css/style.css" />
</head>
<body>
  <!-- <header class="hero" id="top">
    <div class="hero-logo fade-float">
      <img src="./assets/keepknitlogo-02.png" alt="KeepKnit logo">
    </div>

    <div class="hero-text fade-float delay-1">
      <p>KNIT. KEEP. REPEAT.</p>
      <span>Explore the collection.<br>Knit it yourself.</span>
    </div>
  </header> -->

<header class="hero" id="top">
  <div class="hero-inner">
    <div class="hero-logo fade-float">
  <div class="yarn-animation" aria-hidden="true">
    <span class="yarn-strand strand-1"></span>
    <span class="yarn-strand strand-2"></span>
    <span class="yarn-strand strand-3"></span>
  </div>

  <img src="./assets/keepknitlogo-02.png" alt="KeepKnit logo">
</div>
  </div>
</header>

  <nav class="fixed-buttons">
    <button type="button" class="icon-button" id="openList" aria-label="목록으로 보기">
      <img src="./assets/listbtm.png" alt="목록 열기">
    </button>
    <a class="icon-button" href="#top" aria-label="상단으로 이동">
      <img src="./assets/topbtn.png" alt="상단으로 이동">
    </a>
  </nav>

  <main class="archive">
    <button class="knit-item item-1 reveal" data-id="bunny">
      <img src="./assets/miffy.png" alt="미피 파우치" />
      <span>미피 파우치</span>
    </button>

    <button class="knit-item item-2 reveal" data-id="tassel">
      <img src="./assets/jellyfish.png" alt="해파리 키링" />
      <span>해파리 키링</span>
    </button>

    <button class="knit-item item-3 reveal" data-id="pouch">
      <img src="./assets/airpods.png" alt="튤립 에어팟 케이스" />
      <span>튤립 에어팟 케이스</span>
    </button>

    <button class="knit-item item-4 reveal" data-id="tomato">
      <img src="./assets/tomato.png" alt="토마토 키링" />
      <span>토마토 키링</span>
    </button>

    <button class="knit-item item-5 reveal" data-id="house">
      <img src="./assets/house.png" alt="집 모양 티코스터" />
      <span>집 모양 티코스터</span>
    </button>

    <button class="knit-item item-6 reveal" data-id="vest">
      <img src="./assets/vest.png" alt="레이스 패턴 니트 조끼" />
      <span>레이스 패턴 니트 조끼</span>
    </button>

    <button class="knit-item item-7 reveal" data-id="blackbag">
      <img src="./assets/flowerbag.png" alt="플라워 크로스백" />
      <span>플라워 크로스백</span>
    </button>

    <button class="knit-item item-8 reveal" data-id="mushroom">
      <img src="./assets/bookmark.png" alt="버섯 책갈피" />
      <span>버섯 책갈피</span>
    </button>
  </main>

  <footer class="footer">
    <p>knit. keep. repeat.</p>
    <p class="footer-logo">Keep<br>Knit</p>
    <p>knit it yourself.</p>
  </footer>

  <section class="modal" id="patternModal" aria-hidden="true">
    <div class="modal-dim"></div>

    <article class="modal-card">
      <button type="button" class="close-button" id="closeModal" aria-label="닫기">
        ×
      </button>

      <h2 id="modalTitle">아란 카디건</h2>
      <p class="modal-meta" id="modalMeta">대바늘 5mm · 아란울 · 총 40단</p>

      <div class="pattern-box">
        <p id="modalPattern">
          밑단 — 코 만들기 120코<br>
          1~10단: 2코 고무뜨기<br>
          11~30단: 아란 케이블 패턴<br>
          31~38단: 줄이기 · 암홀 성형<br>
          39~40단: 넥라인 마무리
        </p>
      </div>

      <div class="counter">
        <span>단 수 카운터</span>
        <div class="counter-control">
          <button type="button" id="minusCount">−</button>
          <strong class="count-box"><span id="rowCount">1단 완료</span></strong>
          <button type="button" id="plusCount">＋</button>
        </div>
        <button type="button" class="reset-button" id="resetCount">처음으로 리셋</button>
      </div>
    </article>
  </section>

  <section class="list-view" id="listView" aria-hidden="true">
    <div class="list-panel">
      <button type="button" class="close-button" id="closeList" aria-label="목록 닫기">
        ×
      </button>

      <div class="list-grid">
        <!-- JS에서 아이템 목록이 자동으로 들어옵니다. -->
      </div>
    </div>
  </section>
  <div class="cursor-yarn" aria-hidden="true"></div>
  <script src="./js/script.js"></script>
</body>
</html>
